services:
  - type: web
    name: dental-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://your-backend-url.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

